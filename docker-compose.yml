services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: f1-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: f1_demo
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d f1_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  streamlit:
    build: ./streamlit
    container_name: f1-streamlit
    ports:
      - "8501:8501"
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: f1_demo
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data: